[connectivity]
nk=bert_qkv_kernel:1:bert_qkv_1
nk=bert_attn_core_kernel:1:bert_attn_core_1
nk=bert_attn_out_norm_kernel:1:bert_attn_out_norm_1
nk=bert_ffn_up_gelu_v15_tilemajor_uram_bindop_kernel:1:bert_ffn_up_gelu_1
nk=bert_ffn_down_v15_tilemajor_uram_bindop_kernel:1:bert_ffn_down_norm_1

# ATTENTION_200MS_GROUP_PIPELINE: SLR0 fused QKV, SLR1 emits six
# head-group-major context chunks, SLR2 accumulates projection per group and
# emits row-major attention output to FFN UP.
stream_connect=bert_qkv_1.q_stream:bert_attn_core_1.q_stream:256
stream_connect=bert_qkv_1.k_stream:bert_attn_core_1.k_stream:256
stream_connect=bert_qkv_1.v_stream:bert_attn_core_1.v_stream:256
stream_connect=bert_attn_core_1.context_stream:bert_attn_out_norm_1.context_stream:512
stream_connect=bert_attn_out_norm_1.attn_mid_stream:bert_ffn_up_gelu_1.attn_mid_stream:256
stream_connect=bert_ffn_up_gelu_1.gelu_stream:bert_ffn_down_norm_1.gelu_stream:512

slr=bert_qkv_1:SLR0
slr=bert_attn_core_1:SLR1
slr=bert_attn_out_norm_1:SLR2
slr=bert_ffn_up_gelu_1:SLR2
slr=bert_ffn_down_norm_1:SLR3

sp=bert_qkv_1.hidden_in:DDR[0]
sp=bert_qkv_1.hidden_ready:DDR[0]
sp=bert_qkv_1.attn_q_w_all:DDR[0]
sp=bert_qkv_1.attn_q_b_all:DDR[0]
sp=bert_qkv_1.attn_k_w_all:DDR[1]
sp=bert_qkv_1.attn_k_b_all:DDR[1]
sp=bert_qkv_1.attn_v_w_all:DDR[2]
sp=bert_qkv_1.attn_v_b_all:DDR[2]

sp=bert_attn_core_1.attention_mask:DDR[0]

sp=bert_attn_out_norm_1.residual_in:DDR[0]
sp=bert_attn_out_norm_1.residual_ready:DDR[0]
sp=bert_attn_out_norm_1.attn_o_w_all:DDR[3]
sp=bert_attn_out_norm_1.attn_o_b_all:DDR[3]
sp=bert_attn_out_norm_1.attn_norm_gamma_all:DDR[3]
sp=bert_attn_out_norm_1.attn_norm_beta_all:DDR[3]
sp=bert_attn_out_norm_1.attn_mid_ddr:DDR[1]
sp=bert_attn_out_norm_1.attn_mid_done:DDR[1]

sp=bert_ffn_up_gelu_1.w1:DDR[2]
sp=bert_ffn_up_gelu_1.b1:DDR[2]

sp=bert_ffn_down_norm_1.w2:DDR[3]
sp=bert_ffn_down_norm_1.b2:DDR[3]
sp=bert_ffn_down_norm_1.output_hidden:DDR[0]
